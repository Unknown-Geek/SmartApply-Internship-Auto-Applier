[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:xvfb]
command=Xvfb :99 -screen 0 1280x800x24 -ac
autostart=true
autorestart=true
priority=10
stderr_logfile=/var/log/supervisor/xvfb.err.log
stdout_logfile=/var/log/supervisor/xvfb.out.log

[program:pinchtab]
command=pinchtab server
directory=/app
autostart=true
autorestart=true
startsecs=3
priority=20
environment=DISPLAY=":99",CHROME_BIN="/usr/bin/chromium",CHROMIUM_FLAGS="--no-sandbox --disable-dev-shm-usage --headless=new"
stderr_logfile=/var/log/supervisor/pinchtab.err.log
stdout_logfile=/var/log/supervisor/pinchtab.out.log
# PinchTab is optional — if it fails, FastAPI still runs
exitcodes=0,1,2

[program:fastapi]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info
directory=/app
autostart=true
autorestart=true
priority=30
startsecs=5
stderr_logfile=/var/log/supervisor/fastapi.err.log
stdout_logfile=/var/log/supervisor/fastapi.out.log
environment=PYTHONUNBUFFERED="1",DISPLAY=":99"
